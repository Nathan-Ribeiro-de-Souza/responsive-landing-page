<!DOCTYPE html>
<html lang="pt-br">
<head>
  <!-- Configuração básica da página -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Configuração básica da página -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="normalize.css">

  <!-- Ícone da aba -->
  <link rel="shortcut icon" href="Fotos/icon.svg" type="image/x-icon">
  <title>Meu site</title>
</head>
<body>

<!-- Container principal que centraliza todo o layout -->
<div class="container">

<!-- ===== HEADER / NAVEGAÇÃO ===== -->
  <header class="header">

<!-- Logo com link para home -->
  <a href="/">
    <img src="Fotos/logoheader.svg" alt="Logo MeuSite">
  </a>

<!-- Menu de navegação -->
  <nav class="nav">

  <ul class="list_header">

    <li class="li_nav"><a class="link_list" href="/">Home</a></li>
    <li class="li_nav"><a class="link_list" href="https://www.instagram.com/oxxe_than/" target="_blank">Sobre</a></li>
    <li class="li_nav"><a class="link_list" href="https://wa.me/5551981191403" target="_blank">Contato</a></li>

  </ul>
  </nav>
  </header>

  <main>

    <!-- ===== HERO SECTION ===== -->
    <!-- Área principal de destaque do site -->
   <section class="hero">

    <h1>Aprendendo HTML e CSS</h1>   
    <h3>Meu primeiro site completo</h3> 
    <button>Começar</button>

   </section>
   <!-- Título da seção de serviços -->
   <div class="titletwo"><h2>Nossos Serviços</h2></div>

   <!-- ===== SERVIÇOS ===== -->
    <!-- Cards com serviços oferecidos -->
    <section class="servicos">
      
      <div>
        <img src="Fotos/engrenagem.png" alt="engrenagem">
        <h3>Serviço 1</h3>
       <p> Descriçao do serviço 1</p>
      </div>

      <div>
        <img src="Fotos/laptop.png" alt="laptop">
        <h3>Serviço 2</h3>
        <p class="p">Descriçao do serviço 2</p>
       </div>

      <div>
        <img src="Fotos/chat.png" alt="chat">
       <h3> Serviço 3</h3>
       <p>Descriçao do Serviço 3</p>
      </div>

    </section>
 <hr>

 <!-- ===== FORMULÁRIO DE CONTATO ===== -->
    <section class="contato">

      <h2>Entre em Contato</h2>

       <!-- Formulário simples de contato -->
      <form>

      <div>
      <input type="text" placeholder="Nome">
      </div>

      <div>
      <input type="email" placeholder="Email">
      </div>
      
      <button>Enviar</button>
       </form>
    </section>
  </main>

<!-- ===== FOOTER ===== -->
  <footer class="footer">
   <p> 2026 - Meu site</p>
  </footer>

  </div>
</body>
</html>
